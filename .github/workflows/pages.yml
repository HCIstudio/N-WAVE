name: Deploy demo to GitHub Pages

# Builds the frontend in backend-less "demo mode" and publishes it to GitHub
# Pages so every push to main updates a live, try-it-now build. Projects created
# in the demo are ephemeral (stored in the visitor's browser); real execution
# requires the Docker deployment.
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # vite.config.ts embeds the version/commit from git history.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build demo site
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'
          # Served from https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Add SPA fallback
        # GitHub Pages has no server-side routing; serving index.html as 404.html
        # lets client-side deep links (e.g. /workflow/:id) resolve on refresh.
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
