name: CI

on:
    push:
      branches:
        - 'main'
    pull_request:
    workflow_dispatch:

jobs:
  build-images-check:
    name: Build images (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          platforms: linux/amd64     
          push: false                
          load: true                 
          provenance: false          
          sbom: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          # The frontend Dockerfile expects the repository root as its build
          # context: it copies frontend/package.json and the repo .git directory
          # (used to embed the version / commit into the build). Building with
          # ./frontend as the context makes those COPY paths fail.
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          sbom: false
