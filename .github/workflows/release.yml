name: Release assets
permissions:
  contents: write
on:
  push:
    tags:
      - 'v*'
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Ship the production compose file (pulls the published Docker Hub
          # images) plus an example env file so users can run a tagged release
          # without cloning the repo.
          files: |
            latest.yml
            .env.backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}