name: Release

# Every merge into main automatically cuts a new version: it bumps the patch
# version from the latest v* tag, builds the backend and frontend images, pushes
# them to Docker Hub (as :<version> and :latest), and creates a GitHub Release
# (tag v<version>) with the runnable latest.yml attached.
#
# Runs only on main (which is PR-only), so in practice "one release per merged
# PR". Note: images live in Docker Hub — the release "attaches" the compose file
# that pulls them, and lists the image tags in its notes.
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: write

# Serialize releases so two quick merges can't race on the version number.
concurrency:
  group: release
  cancel-in-progress: false

env:
  BACKEND_IMAGE: hcistudio/nwave-backend
  FRONTEND_IMAGE: hcistudio/nwave-frontend

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags for versioning

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            v=${latest#v}
            IFS='.' read -r major minor patch <<< "$v"
            major=${major:-0}; minor=${minor:-0}; patch=${patch:-0}
            next="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next version: v$next (from ${latest:-<none>})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          # Root context on purpose: the frontend Dockerfile copies
          # frontend/package.json and the repo .git directory.
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            latest.yml
          body: |
            Automated release from the latest merge to `main`.

            **Docker images**
            - `${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}` (also `:latest`)
            - `${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}` (also `:latest`)

            **Run it**
            ```bash
            docker compose -f latest.yml up -d
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
