name: Release assets
permissions:
  contents: write
on:
  push:
    tags:
      - 'v*'
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Ship the self-contained production compose file. Users download just
          # this one file and run `docker compose -f latest.yml up -d` to pull
          # the published images and run the full stack — no clone required.
          files: |
            latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}