services:
  mongodb:
    image: mongo:7
    container_name: nwave-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nwave-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/nwave
      BACKEND_CONTAINER_NAME: nwave-backend
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost
    ports:
      - "5001:5001"
    volumes:
      - ./backend/results:/app/results
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_SHA: ${GIT_SHA:-}
    container_name: nwave-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongodb_data:
